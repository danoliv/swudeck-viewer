name: Refresh swubase stats

on:
  schedule:
    - cron: '0 6 * * 2'  # Every Tuesday at 6am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch swubase stats
        run: npm run fetch-swubase

      - name: Commit stats if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stats/
          git diff --staged --quiet || git commit -m "chore: refresh swubase card stats"
          git push
