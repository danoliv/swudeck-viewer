name: Check for new SWU sets

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday at 5am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for new sets
        run: npm run check-new-sets

      - name: Fetch card data for any new sets
        run: npm run fetch-sets

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/sets.json public/data/
          git diff --staged --quiet || git commit -m "chore: add new SWU set(s)"
          git push
