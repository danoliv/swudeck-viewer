<!DOCTYPE html>
<html data-page="account">
<head>
    <meta charset="utf-8">
    <title>SWU Deck Viewer - Account</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="bootstrap-runtime.js"></script>
    <style>
        .account-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
        }
        .account-section {
            margin: 20px 0;
            padding: 15px;
            background: var(--surface-deep);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .account-section h3 {
            margin-top: 0;
            font-family: var(--font-display);
            color: var(--text);
        }
        .account-section input[type="email"] {
            width: 100%;
            max-width: 320px;
            padding: 8px 12px;
            margin-right: 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
        }
        .account-section button {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
        }
        .account-section button:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .deck-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }
        .deck-row:last-child {
            border-bottom: none;
        }
        .deck-row-name {
            font-weight: 600;
            color: var(--text);
        }
        .deck-row-visibility {
            font-size: 0.8em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-left: 8px;
        }
        .deck-row-actions {
            display: flex;
            gap: 6px;
        }
        .deck-row-actions button,
        .deck-row-actions a {
            font-size: 0.85em;
            padding: 4px 10px;
        }
        .info-box {
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--radius-sm);
            margin: 10px 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        #accountStatus {
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="account-container">
        <a href="index.html" class="back-link">← Back to Deck Viewer</a>

        <h1>Account</h1>

        <div id="accountStatus"></div>

        <div id="signedOutView" class="account-section" hidden>
            <h3>Sign in</h3>
            <div>
                <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
                <button id="sendMagicLinkBtn">Send magic link</button>
            </div>
            <div class="info-box">
                We'll email you a one-time sign-in link. No password needed.
            </div>
            <button id="githubSignInBtn">Continue with GitHub</button>
        </div>

        <div id="signedInView" class="account-section" hidden>
            <h3>My Decks</h3>
            <div id="myDecksList"></div>
            <div id="myDecksEmpty" class="info-box" hidden>
                You haven't saved any decks yet. Save one from the Deck Builder.
            </div>
        </div>

        <div id="backendDisabledView" class="info-box" hidden>
            Accounts aren't configured for this deployment yet.
        </div>
    </div>

</body>
</html>
