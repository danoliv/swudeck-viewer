<!DOCTYPE html>
<html data-page="home">
<head>
    <meta charset="utf-8">
    <title>Yet Another SWU Builder — My Decks</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="bootstrap-runtime.js"></script>
    <style>
        #homeStatus {
            margin: 10px 0;
        }
        .page-title {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin: 10px 0 24px;
        }
        .page-title h1 {
            margin: 0;
            font-size: 1.7em;
        }
        .page-title .beta-badge {
            font-size: 0.6em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 3px 10px;
            border-radius: var(--radius-pill);
        }
        .signin-container {
            max-width: 420px;
            margin: 40px auto;
            padding: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
        }
        .signin-container h2 {
            margin: 0 0 6px;
        }
        .signin-subtitle {
            margin: 0 0 20px;
            color: var(--text-muted);
        }
        .signin-email-row {
            display: flex;
            gap: 8px;
        }
        .signin-container input[type="email"] {
            flex: 1;
            min-width: 0;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
        }
        .signin-container button {
            padding: 9px 16px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .signin-container button:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .signin-hint {
            margin: 10px 0 0;
            font-size: 0.85em;
            color: var(--text-muted);
        }
        .signin-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85em;
            margin: 22px 0;
        }
        .signin-divider::before,
        .signin-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .signin-divider span {
            padding: 0 12px;
        }
        .google-signin-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid #747775;
            background: #fff;
            color: #1f1f1f;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: box-shadow 0.2s ease, background 0.2s ease;
        }
        .google-signin-btn:hover {
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
            background: #f8f9fa;
        }
        .info-box {
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--radius-sm);
            margin: 10px 0;
        }

        .home-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .home-layout[hidden] {
            display: none;
        }
        .home-left {
            flex: 2;
            min-width: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }
        .home-right {
            flex: 1;
            min-width: 220px;
        }
        .new-deck-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
        }
        .new-deck-card button {
            margin-top: 12px;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            border: none;
            background: var(--accent);
            color: var(--accent-contrast);
            font-weight: 700;
            cursor: pointer;
        }
        .new-deck-card button:hover {
            opacity: 0.9;
        }
        .deck-gallery-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .deck-gallery-row:last-child {
            border-bottom: none;
        }
        .deck-gallery-art {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .deck-gallery-thumb {
            width: 100px;
            border-radius: 4px;
            background: var(--surface-deep);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        /* Leader/base front art is landscape, unlike the portrait default in styles.css */
        .deck-gallery-thumb .card-images {
            margin: 0;
            padding-bottom: 71.43%;
        }
        .deck-gallery-thumb .card-placeholder {
            font-size: 0.7em;
        }
        .deck-gallery-info {
            flex: 1;
            min-width: 0;
        }
        .deck-gallery-name {
            font-weight: 600;
            color: var(--text);
        }
        .deck-gallery-badges {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .badge {
            font-size: 0.75em;
            padding: 2px 10px;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
        }
        .badge-format {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .badge-visibility {
            background: var(--bg-elevated);
            color: var(--text-muted);
        }
        .deck-gallery-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .deck-gallery-actions button,
        .deck-gallery-actions a {
            font-size: 0.85em;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
        }
        .deck-gallery-actions button:hover,
        .deck-gallery-actions a:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="page-title">
        <h1>Yet Another SWU Builder</h1>
        <span class="beta-badge">Beta</span>
    </div>

    <div id="homeStatus"></div>

    <div id="signinCard" class="signin-container" hidden>
        <h2>Sign in</h2>
        <p class="signin-subtitle">Save decks to your account and access them anywhere.</p>

        <div class="signin-email-row">
            <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
            <button id="sendMagicLinkBtn" type="button">Send magic link</button>
        </div>
        <p class="signin-hint">We'll email you a one-time sign-in link. No password needed.</p>

        <div class="signin-divider"><span>or</span></div>

        <button id="googleSignInBtn" type="button" class="google-signin-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="">
            <span>Sign in with Google</span>
        </button>
    </div>

    <div id="homeLayout" class="home-layout" hidden>
        <div class="home-left">
            <h2>My Decks</h2>
            <div id="decksList"></div>
            <div id="decksEmpty" class="info-box" hidden>
                You haven't saved any decks yet.
            </div>
        </div>
        <div class="home-right">
            <div class="new-deck-card">
                <h3>Start a new deck</h3>
                <p>Choose a format and leader to begin building.</p>
                <button id="newDeckBtn" type="button">+ New Deck</button>
            </div>
        </div>
    </div>

</body>
</html>
