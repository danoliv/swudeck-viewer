<!DOCTYPE html>
<html>
<head>
    <title>SWU Deck Viewer</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/src/components/navigation.ts"></script>
    <script type="module" src="/src/pages/index.ts"></script>
    <style>
        /* Page-specific styles only */
    </style>
</head>
<body>

    <h1>SWU Deck Viewer</h1>
    <div>
        <input type="text" id="deckUrl"
               placeholder="Paste SWUDB deck URL (e.g., https://swudb.com/deck/123...)">
        <button id="loadDeckBtn">Load Deck</button>
        <button id="clearCacheBtn" style="background: #ff9800; margin-left: 10px;">Clear All Cache</button>
        <span id="loading" class="loading" style="display: none;">Loading...</span>
    </div>
    <div id="recentDecks" class="recent-decks"></div>
    <div id="error" class="error"></div>
    <div id="output"></div>
</body>
</html>
